# ----------------------------------------------------------------------------
# default
# ----------------------------------------------------------------------------

default:
  image: debian:stable

# ----------------------------------------------------------------------------
# stages
# ----------------------------------------------------------------------------

stages:
  - build

# ----------------------------------------------------------------------------
# build extensions
# ----------------------------------------------------------------------------

build-extensions:
  stage: build
  tags:
    - linux
    - amd64
    - docker
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
  before_script:
    - ./.ci/ci-setup-debian.sh
  script:
    - make clean all
  artifacts:
    name: "claude-ai-exporter"
    paths:
      - ./tmp/claude-ai-exporter*.zip

# ----------------------------------------------------------------------------
# End-Of-File
# ----------------------------------------------------------------------------
